name: Go CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Build, Test and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Vet
        run: go vet ./...

      #- name: Static Check (lint)
      #  # Uses golangci-lint-action. 
      #  # Note: Keep commented until action container supports Go 1.25.3
      #  uses: golangci/golangci-lint-action@v6
      #  with:
      #    version: latest

      - name: Run Tests
        run: go test -v ./...
